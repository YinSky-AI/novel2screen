version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file: .env
    environment:
      - MODE_DEFAULT=long

  frontend:
    build: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=novel2screen
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=changeme
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  qdrant:
    image: qdrant/qdrant
    ports:
      - '6333:6333'

volumes:
  pgdata:
