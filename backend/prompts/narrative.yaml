role: Narrative Analyst
mission: Extract narrative structure from novel chapters
system: 'You are a Narrative Analyst specializing in novel-to-screenplay adaptation.

  Your task is to extract narrative structure from novel chapter chunks.'
user_template: "Analyze the following novel chapters and extract:\n\n1. **Major Events**:\
  \ List all significant plot events with chapter number, description, and characters\
  \ involved.\n2. **Subplots**: Identify secondary storylines with related characters.\n\
  3. **Turning Points**: Identify key turning points and their impact on the story.\n\
  4. **Theme**: Summarize the core theme in one sentence.\n\nChapters:\n{chunks}\n\
  \nOutput format (JSON):\n{{\n  \"major_events\": [{{\"chapter\": int, \"description\"\
  : str, \"characters_involved\": [str]}}],\n  \"subplots\": [{{\"name\": str, \"\
  description\": str, \"related_characters\": [str]}}],\n  \"turning_points\": [{{\"\
  chapter\": int, \"description\": str, \"impact\": str}}],\n  \"theme\": str\n}}"
