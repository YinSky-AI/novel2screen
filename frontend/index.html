<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel2Screen - AI剧本生成系统</title>
    <link rel="stylesheet" href="/static/styles/main.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-brand">
                <span class="brand-icon">N2S</span>
                <div>
                    <h1>Novel2Screen</h1>
                    <p>将小说智能转化为专业剧本，支持多种文学风格</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- Input Section -->
            <section class="input-section">
                <!-- Steps -->
                <div class="steps-bar">
                    <div class="step active" id="step1">
                        <div class="step-number">1</div>
                        <span>小说信息</span>
                    </div>
                    <div class="step-arrow">&rarr;</div>
                    <div class="step" id="step2">
                        <div class="step-number">2</div>
                        <span>AI分析</span>
                    </div>
                    <div class="step-arrow">&rarr;</div>
                    <div class="step" id="step3">
                        <div class="step-number">3</div>
                        <span>生成剧本</span>
                    </div>
                </div>

                <div class="card form-card">
                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label>小说标题</label>
                            <input type="text" id="title" placeholder="请输入小说标题">
                        </div>
                        <div class="form-group flex-1">
                            <label>小说类型</label>
                            <select id="genre">
                                <option value="">选择类型</option>
                                <option value="xuanhuan">玄幻</option>
                                <option value="dushi">都市</option>
                                <option value="xianxia">仙侠</option>
                                <option value="kehuan">科幻</option>
                                <option value="xuanyi">悬疑</option>
                                <option value="yanqing">言情</option>
                                <option value="lishi">历史</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>创作模式</label>
                        <div class="mode-tabs">
                            <button class="mode-tab active" data-mode="fast" onclick="switchMode('fast')">Demo</button>
                            <button class="mode-tab" data-mode="ai" onclick="switchMode('ai')">AI</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>小说内容</label>
                        <textarea id="novelText" rows="12" placeholder="请输入您的小说内容，至少包含3个章节..."></textarea>
                    </div>

                    <div class="form-actions">
                        <label class="btn btn-outline">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            上传小说文件
                            <input type="file" id="fileInput" accept=".txt,.md" hidden>
                        </label>
                        <button id="convertBtn" class="btn btn-primary" onclick="convertNovel()">
                            开始创作
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Progress -->
                <div id="progress" class="card progress-card hidden">
                    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                    <p id="progressText">正在处理...</p>
                </div>
            </section>

            <!-- Result Section -->
            <section class="result-section" id="resultSection">
                <!-- Preview -->
                <div class="card preview-card">
                    <div class="preview-header">
                        <h3>剧本内容</h3>
                        <div class="preview-stats" id="previewStats"></div>
                    </div>
                    <div id="previewContent" class="preview-content">
                        <div class="empty-state">
                            <span class="empty-icon">
                                <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="6" width="40" height="36" rx="3"/><line x1="4" y1="15" x2="44" y2="15"/><line x1="14" y1="33" x2="34" y2="33"/></svg>
                            </span>
                            <p>还没有生成剧本</p>
                            <p class="text-muted">输入小说内容并点击"开始创作"</p>
                        </div>
                    </div>
                </div>

                <!-- Critic -->
                <div id="criticReport" class="card hidden">
                    <h3>质量评估</h3>
                    <div id="criticContent"></div>
                </div>

                <!-- Export -->
                <div id="exportArea" class="card hidden">
                    <h3>导出剧本</h3>
                    <div id="exportContent"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/utils/api.js"></script>
    <script src="/static/components/app.js"></script>
</body>
</html>
